<footer class="footer">
  {% for item in site.data.settings.social %}
    <a href="{{ item.link }}" class="menu-link" target="_blank"><i class="fa fa-{{ item.icon }}" aria-hidden="true"></i></a>
  {% endfor %}
  <div class="footer-description"><a href="{{ '/' | relative_url }}">{{ site.title }} | {{ site.description }}</a></div>
  <div class="footer-description">Postaveno na šabloně <a href="https://lenpaul.github.io/Millennial/" target="_blank">Millennial</a></div>
</footer>
