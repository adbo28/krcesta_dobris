<article>
  <a href="{{ post.url | relative_url }}">
    <div class="featured-post" {% if post.thumbnail %}style="background-image:url({{ '/assets/img/' | append: post.thumbnail | relative_url }})"{% elsif post.image %}style="background-image:url({{ '/assets/img/' | append: post.image | relative_url }})"{% endif %}>
      <h2><span>{{ post.title }}</span></h2>
    </div>
  </a>
</article>
